openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Athoo Platform API - Website, CRM, Admin Panel
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: leads
    description: Lead CRM management
  - name: admins
    description: Admin user management
  - name: roles
    description: Role-based access control
  - name: emails
    description: Email campaigns and logs
  - name: templates
    description: Email templates
  - name: analytics
    description: Analytics and dashboard
  - name: settings
    description: System settings
  - name: cms
    description: CMS content management
  - name: audit
    description: Audit logs
  - name: notifications
    description: System notifications
  - name: public
    description: Public endpoints (no auth)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── PUBLIC ──────────────────────────────────────────────────────────────────
  /public/waitlist:
    post:
      operationId: submitProviderWaitlist
      tags: [public]
      summary: Submit provider waitlist form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "409":
          description: Already registered

  /public/contact:
    post:
      operationId: submitContactForm
      tags: [public]
      summary: Submit customer contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /public/cms:
    get:
      operationId: getPublicCms
      tags: [public]
      summary: Get all CMS content for website
      responses:
        "200":
          description: CMS content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmsContent"

  /public/settings:
    get:
      operationId: getPublicSettings
      tags: [public]
      summary: Get public site settings
      responses:
        "200":
          description: Public settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettings"

  # ── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
        "429":
          description: Rate limited

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated admin
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          description: Unauthorized

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change current admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset

  # ── LEADS ─────────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads with filters
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: source
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: assignedTo
          schema:
            type: integer
      responses:
        "200":
          description: Leads list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"

    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Not found

    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete lead
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/{id}/notes:
    get:
      operationId: listLeadNotes
      tags: [leads]
      summary: List notes for a lead
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadNote"

    post:
      operationId: createLeadNote
      tags: [leads]
      summary: Add note to lead
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadNoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadNote"

  /leads/bulk-action:
    post:
      operationId: bulkLeadAction
      tags: [leads]
      summary: Bulk action on leads (delete, assign, update status)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkLeadActionInput"
      responses:
        "200":
          description: Action applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResult"

  /leads/export:
    get:
      operationId: exportLeads
      tags: [leads]
      summary: Export leads as CSV
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: source
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  # ── ADMINS ─────────────────────────────────────────────────────────────────────
  /admins:
    get:
      operationId: listAdmins
      tags: [admins]
      summary: List all admins
      responses:
        "200":
          description: Admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Admin"

    post:
      operationId: createAdmin
      tags: [admins]
      summary: Create a new admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"

  /admins/{id}:
    get:
      operationId: getAdmin
      tags: [admins]
      summary: Get admin by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"

    patch:
      operationId: updateAdmin
      tags: [admins]
      summary: Update admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"

    delete:
      operationId: deleteAdmin
      tags: [admins]
      summary: Delete admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admins/{id}/status:
    patch:
      operationId: updateAdminStatus
      tags: [admins]
      summary: Suspend, activate or deactivate admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"

  # ── ROLES ─────────────────────────────────────────────────────────────────────
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List all roles
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

    post:
      operationId: createRole
      tags: [roles]
      summary: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{id}:
    patch:
      operationId: updateRole
      tags: [roles]
      summary: Update role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

    delete:
      operationId: deleteRole
      tags: [roles]
      summary: Delete role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── EMAIL CAMPAIGNS ──────────────────────────────────────────────────────────
  /emails:
    get:
      operationId: listEmails
      tags: [emails]
      summary: List all email campaigns/logs
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Email logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLogListResponse"

    post:
      operationId: sendEmail
      tags: [emails]
      summary: Send an email campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailInput"
      responses:
        "201":
          description: Email sent/scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLog"

  /emails/{id}:
    get:
      operationId: getEmail
      tags: [emails]
      summary: Get email log by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLog"

  /emails/{id}/retry:
    post:
      operationId: retryEmail
      tags: [emails]
      summary: Retry failed email
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retried

  # ── TEMPLATES ──────────────────────────────────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List email templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"

    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create email template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get template by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update email template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ANALYTICS ─────────────────────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/leads-over-time:
    get:
      operationId: getLeadsOverTime
      tags: [analytics]
      summary: Get leads grouped by day/week/month
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month]
        - in: query
          name: days
          schema:
            type: integer
      responses:
        "200":
          description: Time series data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSeriesPoint"

  /analytics/leads-by-status:
    get:
      operationId: getLeadsByStatus
      tags: [analytics]
      summary: Get lead counts grouped by status
      responses:
        "200":
          description: Status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusBreakdown"

  /analytics/leads-by-source:
    get:
      operationId: getLeadsBySource
      tags: [analytics]
      summary: Get lead counts grouped by source
      responses:
        "200":
          description: Source breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusBreakdown"

  /analytics/email-stats:
    get:
      operationId: getEmailStats
      tags: [analytics]
      summary: Get email campaign analytics
      responses:
        "200":
          description: Email stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailStats"

  # ── SETTINGS ─────────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: listSettings
      tags: [settings]
      summary: List all settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update multiple settings at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"

  # ── CMS ─────────────────────────────────────────────────────────────────────
  /cms:
    get:
      operationId: listCmsContent
      tags: [cms]
      summary: List all CMS content blocks
      responses:
        "200":
          description: CMS content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmsContent"

  /cms/{section}:
    get:
      operationId: getCmsSection
      tags: [cms]
      summary: Get CMS content for a section
      parameters:
        - in: path
          name: section
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsContent"

    put:
      operationId: updateCmsSection
      tags: [cms]
      summary: Update CMS content for a section
      parameters:
        - in: path
          name: section
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmsContentInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmsContent"

  # ── AUDIT LOGS ───────────────────────────────────────────────────────────────
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      parameters:
        - in: query
          name: adminId
          schema:
            type: integer
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  # ── NOTIFICATIONS ────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current admin
      parameters:
        - in: query
          name: unread
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH SCHEMAS ────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        rememberMe:
          type: boolean

    AuthResponse:
      type: object
      required: [admin, token]
      properties:
        admin:
          $ref: "#/components/schemas/Admin"
        token:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8

    # ── ADMIN SCHEMAS ────────────────────────────────────────────────────────────
    Admin:
      type: object
      required: [id, name, email, roleId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        roleId:
          type: integer
        roleName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, suspended, inactive]
        avatarUrl:
          type: ["string", "null"]
        lastLoginAt:
          type: ["string", "null"]
        createdAt:
          type: string

    AdminInput:
      type: object
      required: [name, email, password, roleId]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        roleId:
          type: integer
        avatarUrl:
          type: string

    AdminUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        roleId:
          type: integer
        avatarUrl:
          type: string

    AdminStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, suspended, inactive]

    # ── ROLE SCHEMAS ────────────────────────────────────────────────────────────
    Role:
      type: object
      required: [id, name, permissions, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        permissions:
          type: object
        isSystem:
          type: boolean
        createdAt:
          type: string

    RoleInput:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: object

    RoleUpdate:
      type: object
      properties:
        name:
          type: string
