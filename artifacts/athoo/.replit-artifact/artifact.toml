kind = "web"
previewPath = "/"
title = "Athoo - Pakistan's Smart Home Services Platform"
version = "1.0.0"
id = "artifacts/athoo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22873

[services.development]
run = "pnpm --filter @workspace/athoo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/athoo", "run", "build" ]
publicDir = "artifacts/athoo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22873"
BASE_PATH = "/"
